<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaxiStock</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-logo">
            <a href="index.html">VaxiStock</a>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="animals.html" class="active">Animals</a></li>
            <li><a href="vaccination.html">Vaccination</a></li>
            <li><a href="history.html">History</a></li>
        </ul>
    </nav>
    <header>
        <h1> Manage Animals </h1>
        <p> Register and view all your livestock </p>
    </header>
    <main>
        <div class="container">
            <div class="form-panel">
                <h2>Animal Registration Form</h2>
                <form id="animal-form">
                    <label for="name">Animal Name: </label>
                    <input type="text" id="name" placeholder="Enter Animal Name">
                    <label for="species">Species: </label>
                    <select name="species" id="species">
                        <option value="cow">Cow</option>
                        <option value="buffalo">Buffalo</option>
                        <option value="goat">Goat</option>
                        <option value="sheep">Sheep</option>
                    </select>
                    <label for="breed">Breed: </label>
                    <input type="text" name="breed" id="breed">
                    <label>Gender:</label>
                    <div class="radio-group">
                        <input type="radio" name="gender" id="male" value="male">
                        <label for="male">Male</label>
                        <input type="radio" name="gender" id="female" value="female">
                        <label for="female">Female</label>
                    </div>
                    <label for="notes">Notes: </label>
                    <textarea id="notes" placeholder="Enter Notes"></textarea>
                    <button type="submit">Register Animal</button>
                </form>
            </div>
            <div class="list-panel">
                <input type="search">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Species</th>
                            <th>Breed</th>
                            <th>Gender</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="animals-tbody">

                    </tbody>
                </table>
                <p id="no-animals-regst">No animals registered yet.</p>
            </div>
        </div>
    </main>    
    <footer>
            Livestock Vaccination — Keeping your livestock healthy
    </footer>
    <script src="script.js"></script>
</body>
</html>
